version: 1
cases:
  - id: completed-wayfinder
    input: |
      A completed decision map targets backward-compatible API-token rotation. Decisions require expansion with two valid tokens, verified client migration, audit evidence, and contraction by revoking the old token. Requirements are req-1, req-2, and req-3. OAuth is explicitly out of scope.
    expected:
      ready_for_looper: true
      requirement_ids: [req-1, req-2, req-3]
      forbidden_terms: [OAuth]
      minimum_frontier: 1
  - id: incomplete-wayfinder
    input: |
      A decision map targets export support, but the export-format decision ticket remains open and in-scope fog remains. The only provisional requirement is req-1. Do not invent implementation work.
    expected:
      ready_for_looper: false
      requirement_ids: [req-1]
      forbidden_terms: []
      childbead_count: 0
      required_risk_terms: [decision, fog]
  - id: direct-accepted-spec
    input: |
      An accepted spec, with no Wayfinder map, requires req-1: users can export one report as CSV and validate the downloaded header. Produce the smallest independently verifiable implementation packet.
    expected:
      ready_for_looper: true
      requirement_ids: [req-1]
      forbidden_terms: [Wayfinder reconstruction]
      minimum_frontier: 1
  - id: wide-refactor
    input: |
      An accepted spec contains req-rename: rename tokenId to credentialId across many callers without a broken intermediate commit. Both forms can coexist temporarily. Use the wide-refactor exception.
    expected:
      ready_for_looper: true
      requirement_ids: [req-rename]
      forbidden_terms: []
      required_id_terms: [expand, migrate, contract]
      minimum_frontier: 1
  - id: independent-frontier
    input: |
      An accepted spec has three requirements: req-a validates imports, req-b validates exports, and req-c publishes only after both validations. Import and export validation are independent.
    expected:
      ready_for_looper: true
      requirement_ids: [req-a, req-b, req-c]
      forbidden_terms: []
      minimum_frontier: 2
